name: CI
on: [push, pull_request]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cgo: '0'
            binary: teleport.exe
            asset: teleport-windows-amd64.exe
          - os: macos-latest
            cgo: '1'
            binary: teleport
            asset: teleport-macos-arm64
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: ${{ matrix.cgo }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - run: go build -o ${{ matrix.asset }} ./cmd/teleport

      - run: go vet ./...

      - run: go test ./internal/transport/... ./internal/discovery/... ./internal/staging/... -count=1

      # Always upload artifact (for dev builds)
      - uses: actions/upload-artifact@v4
        with:
          name: teleport-${{ runner.os }}
          path: ${{ matrix.asset }}

      # Create GitHub Release with binaries when a version tag is pushed
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ matrix.asset }}
