name: CI
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cgo: '0'
            binary: teleport.exe
            race: '-race'
          - os: macos-latest
            cgo: '1'
            binary: teleport
            race: ''
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: ${{ matrix.cgo }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - run: go build -o ${{ matrix.binary }} ./cmd/teleport

      - run: go vet ./...

      # Skip clipboard tests that require a desktop session (CI runners are headless).
      # -race requires cgo C compiler; skip on macOS to avoid toolchain issues.
      - run: go test ./internal/transport/... ./internal/discovery/... ./internal/staging/... ${{ matrix.race }} -count=1

      - uses: actions/upload-artifact@v4
        with:
          name: teleport-${{ runner.os }}
          path: ${{ matrix.binary }}
